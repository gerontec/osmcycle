name: Release APK

# The APK is built locally (fast, reliable) and uploaded to heissa.de; this
# workflow just fetches it and publishes a GitHub release so Obtainium can
# auto-update. Token-free (uses GITHUB_TOKEN), no building in CI.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch pre-built APK from heissa.de
        run: |
          curl -fSL --retry 5 --retry-delay 10 \
            -o "osmcycle-${GITHUB_REF_NAME}.apk" \
            "https://heissa.de/web1/apk/osmcycle-${GITHUB_REF_NAME}.apk"
          ls -la osmcycle-*.apk

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: osmcycle-${{ github.ref_name }}.apk
          generate_release_notes: true
          fail_on_unmatched_files: true
